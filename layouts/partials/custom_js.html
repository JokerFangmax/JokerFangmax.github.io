{{ if eq .Type "post" }}
<script type="module">
  import { Transformer } from 'https://cdn.jsdelivr.net/npm/markmap-lib@0.18.12/+esm';
  import { Markmap } from 'https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/+esm';

  const shell = document.querySelector('.js-post-markmap-shell');
  const svg = document.querySelector('.js-post-markmap');
  const article = document.querySelector('.article-style');
  const progressShell = document.querySelector('.js-post-reading-progress');
  const progressFill = document.querySelector('.js-post-reading-progress-fill');
  const progressPercent = document.querySelector('.js-post-progress-percent');
  const progressCurrent = document.querySelector('.js-post-progress-current');
  const progressPrev = document.querySelector('.js-post-progress-prev');
  const progressNext = document.querySelector('.js-post-progress-next');
  const sectionNavList = document.querySelector('.js-post-section-nav-list');
  const markmapToggle = document.querySelector('.js-post-markmap-toggle');

  const slugify = (value) =>
    value
      .toLowerCase()
      .trim()
      .replace(/[^\w\u4e00-\u9fff\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-');

  const escapeMarkdown = (value) =>
    value.replace(/([\[\]\(\)])/g, '\\$1').trim();

  const cleanHeadingText = (heading) => (heading?.textContent || '').replace(/\s+/g, ' ').trim();

  const shouldIncludeHeading = (heading) => {
    const text = cleanHeadingText(heading).toLowerCase();
    return text && !['source file', 'notes'].includes(text);
  };

  const inferHeadingLevel = (heading) => {
    const domLevel = Math.min(Math.max(Number(heading.tagName.slice(1)), 2), 4);
    const text = cleanHeadingText(heading);
    const numbered = text.match(/^(\d+(?:\.\d+)*)\b/);
    if (!numbered) return domLevel;
    const numericLevel = Math.min(numbered[1].split('.').length + 1, 4);
    return numericLevel;
  };

  let currentHeading = null;

  const smoothJumpToId = (id) => {
    const target = document.getElementById(id);
    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    history.replaceState(null, '', `#${id}`);
  };

  const clearHeadingHighlights = () => {
    if (!article) return;
    article.querySelectorAll('.is-current-section').forEach((el) => el.classList.remove('is-current-section'));
  };

  const highlightHeading = (heading) => {
    clearHeadingHighlights();
    if (heading) heading.classList.add('is-current-section');
  };

  const markAncestors = (node) => {
    let current = node?.parentElement;
    while (current) {
      if (current.classList?.contains('markmap-node')) current.classList.add('is-active-parent');
      current = current.parentElement;
    }
  };

  const highlightMarkmapNode = (id) => {
    if (!svg || !id) return;
    svg.classList.remove('has-active-node');
    svg.querySelectorAll('.markmap-node.is-active, .markmap-node.is-active-parent').forEach((node) => {
      node.classList.remove('is-active', 'is-active-parent');
    });

    const selectors = [
      `a[href="#${CSS.escape(id)}"]`,
      `a[*|href="#${CSS.escape(id)}"]`
    ];

    let activeLink = null;
    for (const selector of selectors) {
      activeLink = svg.querySelector(selector);
      if (activeLink) break;
    }

    const node = activeLink?.closest('g.markmap-node') || activeLink?.closest('g');
    if (node) {
      svg.classList.add('has-active-node');
      node.classList.add('is-active');
      markAncestors(node);
    }
  };

  const highlightSectionNav = (id) => {
    if (!sectionNavList) return;
    sectionNavList.querySelectorAll('.post-section-nav-item.is-active').forEach((item) => item.classList.remove('is-active'));
    const activeItem = sectionNavList.querySelector(`.post-section-nav-item[href="#${CSS.escape(id)}"]`);
    if (activeItem) {
      activeItem.classList.add('is-active');
      activeItem.scrollIntoView({ block: 'nearest' });
    }
  };

  if (markmapToggle && shell) {
    markmapToggle.addEventListener('click', () => {
      const collapsed = shell.classList.toggle('is-collapsed');
      markmapToggle.textContent = collapsed ? 'Expand' : 'Collapse';
      markmapToggle.setAttribute('aria-expanded', String(!collapsed));
    });
  }

  if (shell && svg && article) {
    const title = shell.dataset.title || document.title || 'Mindmap';
    const headings = Array.from(article.querySelectorAll('h2, h3, h4')).filter(shouldIncludeHeading);

    if (headings.length < 2) {
      shell.classList.add('is-hidden');
    } else {
      const markdownLines = [`# [${escapeMarkdown(title)}](#post-top)`];

      headings.forEach((heading) => {
        if (!heading.id) heading.id = slugify(cleanHeadingText(heading) || 'section');
        const level = inferHeadingLevel(heading);
        const prefix = '#'.repeat(level);
        const label = escapeMarkdown(cleanHeadingText(heading));
        markdownLines.push(`${prefix} [${label}](#${heading.id})`);
      });

      const transformer = new Transformer();
      const { root } = transformer.transform(markdownLines.join('\n'));

      Markmap.create(svg, {
        autoFit: true,
        duration: 300,
        maxWidth: 320,
        initialExpandLevel: 2,
        colorFreezeLevel: 2,
        pan: true,
        zoom: true
      }, root);

      svg.addEventListener('click', (event) => {
        const link = event.target.closest('a[href^="#"]');
        if (!link) return;
        const href = link.getAttribute('href') || '';
        const id = href.replace(/^#/, '').trim();
        if (!id) return;
        event.preventDefault();
        smoothJumpToId(id);
      });
    }
  }

  if (article && sectionNavList) {
    const navHeadings = Array.from(article.querySelectorAll('h2, h3, h4')).filter(shouldIncludeHeading);
    navHeadings.forEach((heading) => {
      if (!heading.id) heading.id = slugify(cleanHeadingText(heading) || 'section');
    });

    sectionNavList.innerHTML = navHeadings
      .map((heading) => {
        const level = inferHeadingLevel(heading);
        const label = cleanHeadingText(heading);
        return `<a class="post-section-nav-item" data-level="${level}" href="#${heading.id}"><span class="post-section-nav-bullet"></span><span>${label}</span></a>`;
      })
      .join('');

    sectionNavList.addEventListener('click', (event) => {
      const link = event.target.closest('a[href^="#"]');
      if (!link) return;
      const id = (link.getAttribute('href') || '').replace(/^#/, '').trim();
      if (!id) return;
      event.preventDefault();
      smoothJumpToId(id);
    });
  }

  if (article && progressShell && progressFill && progressPercent && progressCurrent && progressPrev && progressNext) {
    const headings = Array.from(article.querySelectorAll('h2, h3')).filter(shouldIncludeHeading);
    headings.forEach((heading) => {
      if (!heading.id) heading.id = slugify(cleanHeadingText(heading) || 'section');
    });

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
    const sectionName = (heading) => cleanHeadingText(heading);

    const updateProgress = () => {
      const articleRect = article.getBoundingClientRect();
      const articleTop = window.scrollY + articleRect.top;
      const articleHeight = Math.max(article.scrollHeight - window.innerHeight * 0.35, 1);
      const viewportOffset = window.innerHeight * 0.24;
      const rawProgress = ((window.scrollY + viewportOffset) - articleTop) / articleHeight;
      const progress = clamp(rawProgress, 0, 1);
      const percent = Math.round(progress * 100);

      progressFill.style.width = `${percent}%`;
      progressPercent.textContent = `${percent}%`;

      if (!headings.length) {
        progressCurrent.textContent = 'Reading article';
        progressPrev.textContent = 'Start';
        progressNext.textContent = 'End';
        return;
      }

      let currentIndex = 0;
      headings.forEach((heading, index) => {
        const top = heading.getBoundingClientRect().top;
        if (top <= viewportOffset + 24) currentIndex = index;
      });

      const current = headings[currentIndex];
      const prev = headings[currentIndex - 1];
      const next = headings[currentIndex + 1];

      progressCurrent.textContent = sectionName(current) || 'Opening section';
      progressPrev.textContent = prev ? `Prev: ${sectionName(prev)}` : 'Start';
      progressNext.textContent = next ? `Next: ${sectionName(next)}` : 'End';

      if (current !== currentHeading) {
        currentHeading = current;
        highlightHeading(currentHeading);
      }

      if (current?.id) {
        highlightMarkmapNode(current.id);
        highlightSectionNav(current.id);
      }
    };

    updateProgress();
    window.addEventListener('scroll', updateProgress, { passive: true });
    window.addEventListener('resize', updateProgress);
  }
</script>
{{ end }}
